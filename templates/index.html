<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Recognition - Dress Up Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 1400px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .video-box {
            background: #f5f5f5;
            border-radius: 15px;
            overflow: hidden;
        }

        .video-box h2 {
            background: #667eea;
            color: white;
            padding: 15px;
            margin: 0;
            font-size: 1.2em;
        }

        .video-container {
            position: relative;
            background: black;
            aspect-ratio: 4/3;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        .status {
            padding: 15px;
            text-align: center;
            font-size: 0.9em;
            color: #666;
        }

        .status.loading {
            background: #fff3cd;
            color: #856404;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .controls {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .info h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .info ul {
            list-style: none;
            margin-left: 20px;
        }

        .info li {
            color: #333;
            margin: 5px 0;
        }

        .info li:before {
            content: "✓ ";
            color: #667eea;
            font-weight: bold;
            margin-right: 8px;
        }

        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Dress Up Game</h1>
            <p>Use hand gestures to select your character</p>
        </div>

        <div class="info">
            <h3>How to use:</h3>
            <ul>
                <li>Make a fist with only your index finger extended</li>
                <li>Move your hand left or right to change the character</li>
                <li>Press <strong>S</strong> to save your current character display</li>
            </ul>
        </div>

        <div class="content">
            <div class="video-box">
                <h2>📹 Camera</h2>
                <div class="video-container">
                    <canvas id="camera-canvas"></canvas>
                </div>
                <div class="status" id="camera-status">Loading...</div>
            </div>

            <div class="video-box">
                <h2>👤 Character</h2>
                <div class="video-container">
                    <canvas id="character-canvas"></canvas>
                </div>
                <div class="status" id="character-status">Ready</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-primary" onclick="toggleCamera()">
                <span id="btn-text">Start Camera</span>
            </button>
            <button class="btn-secondary" onclick="changeBody('left')">← Previous Body</button>
            <button class="btn-secondary" onclick="changeBody('right')">Next Body →</button>
            <button class="btn-success" onclick="saveCharacter()">💾 Save Character</button>
        </div>
    </div>

    <script>
        let video = null;
        let cameraRunning = false;
        let animationId = null;
        const totalBodies = parseInt(document.querySelector('div[data-total-bodies]')?.getAttribute('data-total-bodies') || '{{ total_bodies }}');
        let currentBodyIndex = 0;
        let lastSwipeTime = 0;
        const SWIPE_COOLDOWN = 500; // ms

        const cameraCanvas = document.getElementById('camera-canvas');
        const characterCanvas = document.getElementById('character-canvas');
        const cameraCTX = cameraCanvas.getContext('2d');
        const characterCTX = characterCanvas.getContext('2d');

        // Set canvas sizes
        cameraCanvas.width = 640;
        cameraCanvas.height = 480;
        characterCanvas.width = 600;
        characterCanvas.height = 800;

        function updateStatus(elementId, message, type = '') {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = 'status ' + type;
        }

        function toggleCamera() {
            if (cameraRunning) {
                stopCamera();
            } else {
                startCamera();
            }
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480 },
                audio: false
            }).then(stream => {
                video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                cameraRunning = true;
                document.getElementById('btn-text').textContent = 'Stop Camera';
                updateStatus('camera-status', 'Running', 'success');
                processFrames();
            }).catch(error => {
                console.error('Error:', error);
                updateStatus('camera-status', 'Camera access denied', 'error');
            });
        }

        function stopCamera() {
            if (video && video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            cameraRunning = false;
            document.getElementById('btn-text').textContent = 'Start Camera';
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
        }

        function processFrames() {
            if (!cameraRunning || !video || video.readyState !== video.HAVE_ENOUGH_DATA) {
                animationId = requestAnimationFrame(processFrames);
                return;
            }

            // Draw video to canvas
            cameraCTX.drawImage(video, 0, 0, cameraCanvas.width, cameraCanvas.height);
            const imageData = cameraCanvas.toDataURL('image/jpeg');

            // Send to backend
            fetch('/api/process-frame', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ frame: imageData })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    updateStatus('camera-status', 'Error: ' + data.error, 'error');
                } else {
                    // Draw camera frame
                    const cameraImg = new Image();
                    cameraImg.onload = () => {
                        cameraCTX.drawImage(cameraImg, 0, 0);
                    };
                    cameraImg.src = 'data:image/png;base64,' + data.camera_frame;

                    // Draw character frame
                    const characterImg = new Image();
                    characterImg.onload = () => {
                        characterCTX.drawImage(characterImg, 0, 0);
                    };
                    characterImg.src = 'data:image/png;base64,' + data.character_frame;

                    currentBodyIndex = data.current_body_index;
                    updateStatus('camera-status', 'Processing...', '');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                updateStatus('camera-status', 'Error processing frame', 'error');
            });

            animationId = requestAnimationFrame(processFrames);
        }

        function changeBody(direction) {
            const currentTime = Date.now();
            if (currentTime - lastSwipeTime < SWIPE_COOLDOWN) {
                return;
            }
            lastSwipeTime = currentTime;

            fetch('/api/change-body', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ direction: direction })
            })
            .then(response => response.json())
            .then(data => {
                currentBodyIndex = data.current_body_index;
            })
            .catch(error => console.error('Error:', error));
        }

        function saveCharacter() {
            const imageData = characterCanvas.toDataURL('image/jpeg');
            
            fetch('/api/save-character', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ frame: imageData })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    updateStatus('character-status', '✓ Saved: ' + data.filename, 'success');
                    setTimeout(() => {
                        updateStatus('character-status', 'Ready');
                    }, 3000);
                } else {
                    updateStatus('character-status', 'Error: ' + data.error, 'error');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                updateStatus('character-status', 'Error saving', 'error');
            });
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 's' || e.key === 'S') {
                saveCharacter();
            } else if (e.key === 'ArrowLeft') {
                changeBody('left');
            } else if (e.key === 'ArrowRight') {
                changeBody('right');
            }
        });
    </script>
</body>
</html>
